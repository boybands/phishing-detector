<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Deteksi Phishing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">🔍 Deteksi Phishing Domain</h2>

  <form method="POST" class="d-flex mb-4">
    <input type="text" name="url" class="form-control me-2" placeholder="Masukkan URL (contoh: https://example.com)" required>
    <button type="submit" class="btn btn-primary">Cek</button>
  </form>

  {% if hasil %}
  <div class="card shadow-sm">
    <div class="card-body">
      <pre class="mb-0">{{ hasil }}</pre>
    </div>
    {% if status == "phishing" %}
      <div class="card-footer bg-danger text-white">⚠️ Status: Phishing</div>
    {% elif status == "legit" %}
      <div class="card-footer bg-success text-white">✅ Status: Legit</div>
    {% else %}
      <div class="card-footer bg-warning text-dark">❓ Status: Unknown</div>
    {% endif %}
  </div>

  <!-- 🔊 Script suara otomatis -->
  <script>
    (function(){
      let status = "{{ status }}";
      let text = "";
      if (status === "legit") {
          text = "Link ini adalah link asli";
      } else if (status === "phishing") {
          text = "Link ini adalah link palsu";
      } else {
          text = "Link ini adalah link tidak diketahui";
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "id-ID"; // Bahasa Indonesia
      speechSynthesis.speak(utterance);
    })();
  </script>
  {% endif %}
</div>

</body>
</html>
